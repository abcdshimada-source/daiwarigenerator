<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台割ジェネレーター</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{
  --paper:#f6f8f9; --card:#ffffff; --ink:#1c3557; --ink-soft:#4a627e;
  --line:#c9d4dc; --line-soft:#e3eaef; --accent:#b93a2b; --ok:#2e7d4f;
  --band:#eef3f7;
  --mono:"SF Mono","Consolas","Menlo",monospace;
  --mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;font-size:13px;line-height:1.6}
header{background:var(--ink);color:#fff;padding:10px 20px;display:flex;align-items:baseline;gap:14px}
header h1{font-family:var(--mincho);font-size:19px;font-weight:600;letter-spacing:.12em}
header .sub{font-size:11px;opacity:.75;letter-spacing:.05em}
.wrap{display:flex;gap:0;align-items:flex-start}
/* ---------- controls ---------- */
#panel{width:390px;flex:none;background:var(--card);border-right:1px solid var(--line);height:calc(100vh - 43px);overflow-y:auto;padding:14px 16px 60px}
fieldset{border:1px solid var(--line);border-radius:4px;padding:10px 12px 12px;margin-bottom:14px;background:#fff}
legend{font-size:12px;font-weight:700;padding:0 6px;letter-spacing:.08em;color:var(--ink)}
.row{display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap}
.row label{font-size:12px;color:var(--ink-soft);white-space:nowrap}
input[type=text],input[type=number],select{border:1px solid var(--line);border-radius:3px;padding:4px 6px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff}
input[type=number]{width:60px;font-family:var(--mono);text-align:right}
input[type=text]{flex:1;min-width:80px}
input:focus,select:focus{outline:2px solid var(--ink);outline-offset:0}
.hint{font-size:11px;color:var(--ink-soft)}
.total-line{font-family:var(--mono);font-size:14px;background:var(--band);border-radius:3px;padding:5px 8px;margin-top:6px}
.total-line b{font-size:17px}
/* episode / omake list */
.item{border:1px solid var(--line-soft);border-radius:4px;padding:8px;margin:6px 0;background:#fcfdfe}
.item .row{margin:4px 0}
.item-head{display:flex;gap:6px;align-items:center}
.item-head .idx{font-family:var(--mono);font-size:11px;color:var(--ink-soft);width:20px}
button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:3px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit}
button:hover{background:var(--band)}
button.mini{padding:2px 7px;font-size:11px}
button.add{border-style:dashed;width:100%;margin-top:4px}
button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
button.primary:hover{background:#2a4a75}
.chk{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-soft);cursor:pointer}
/* ---------- output ---------- */
#out{flex:1;padding:18px 22px 80px;min-width:0}
#booktitle{font-family:var(--mincho);font-size:17px;font-weight:600;margin-bottom:2px}
#bookmeta{font-size:12px;color:var(--ink-soft);font-family:var(--mono);margin-bottom:10px}
/* status */
#status{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.badge{border:1px solid var(--line);border-radius:3px;padding:4px 10px;font-size:12px;background:#fff;font-family:var(--mono)}
.badge.warn{border-color:var(--accent);color:var(--accent);font-weight:700}
.badge.good{border-color:var(--ok);color:var(--ok)}
#advice{font-size:12px;color:var(--accent);margin-bottom:10px}
#advice.ok{color:var(--ok)}
/* strip */
#strip{display:flex;gap:0;margin:4px 0 4px;border:1px solid var(--line);border-radius:3px;overflow:hidden;background:#fff}
.fold-seg{display:flex;flex:1;border-right:2px solid var(--ink)}
.fold-seg:last-child{border-right:none}
.tick{flex:1;height:26px;border-right:1px solid rgba(255,255,255,.7)}
.tick:hover{outline:2px solid var(--accent);outline-offset:-2px}
#striplegend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin:4px 0 14px}
#striplegend span{display:inline-flex;align-items:center;gap:4px}
#striplegend i{width:11px;height:11px;border:1px solid var(--line);display:inline-block}
/* episode start summary */
#epstarts{font-size:12px;margin-bottom:14px;color:var(--ink-soft)}
#epstarts .L{color:var(--accent);font-weight:700}
#epstarts code{font-family:var(--mono)}
/* table */
#grid{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
table{border-collapse:collapse;background:#fff;font-size:12px}
th,td{border:1px solid var(--line);padding:2px 7px;text-align:left;white-space:nowrap}
th{background:var(--ink);color:#fff;font-weight:600;font-size:11px;letter-spacing:.05em}
td.num,td.ori,td.ren{font-family:var(--mono);text-align:right}
td.ori{font-weight:700;background:var(--band)}
td.content{min-width:110px}
td[contenteditable]:focus{outline:2px solid var(--accent);outline-offset:-2px;background:#fff8f7}
tr.fold-start td{border-top:2px solid var(--ink)}
td .side{font-size:9px;color:var(--ink-soft);margin-left:5px}
/* toolbar */
#tools{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 6px}
#toolhint{font-size:11px;color:var(--ink-soft);margin-bottom:14px}
#toast{position:fixed;bottom:18px;right:18px;background:var(--ink);color:#fff;padding:8px 16px;border-radius:4px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:340px}
#toast.show{opacity:1}
@media print{
  #panel,header,#tools,#toolhint,#toast{display:none!important}
  body{background:#fff}
  #out{padding:0}
  .tick{height:14px}
}
</style>
</head>
<body>
<header>
  <h1>台割ジェネレーター</h1>
  <span class="sub">コミックス台割 一括生成ツール</span>
</header>
<div class="wrap">

<!-- ================= 入力パネル ================= -->
<div id="panel">

  <fieldset>
    <legend>基本情報</legend>
    <div class="row"><label>作品名</label><input type="text" id="title" value="" placeholder="作品タイトル"></div>
    <div class="row">
      <label>巻数</label><input type="number" id="vol" value="1" min="1" style="width:50px">
      <label>判型</label>
      <select id="format">
        <option>B6判</option><option>A5判</option><option>四六判</option><option>新書判</option><option>文庫判</option>
      </select>
    </div>
    <div class="row">
      <label>折数（16P/折）</label><input type="number" id="oris" value="11" min="1" max="30">
      <label>調整（±4P）</label>
      <select id="adjust">
        <option value="-12">−12</option><option value="-8">−8</option><option value="-4">−4</option>
        <option value="0" selected>±0</option>
        <option value="4">＋4</option><option value="8">＋8</option><option value="12">＋12</option>
      </select>
    </div>
    <div class="total-line">総ページ：<b id="totalDisp">176</b> P<span class="hint" id="totalCalc"></span></div>
  </fieldset>

  <fieldset>
    <legend>前付</legend>
    <div class="row">
      <label>カラー口絵</label><input type="number" id="kuchie" value="0" min="0" step="2"><span class="hint">P（総扉の前）</span>
    </div>
    <div class="row">
      <label class="chk"><input type="checkbox" id="cover" checked>総扉</label>
      <label>目次</label><input type="number" id="toc" value="1" min="0"><span class="hint">P</span>
    </div>
  </fieldset>

  <fieldset>
    <legend>収録話</legend>
    <div class="hint" style="margin-bottom:4px">各話の前に入れるカット／ロゴを個別指定できます</div>
    <div id="epList"></div>
    <button class="add" onclick="addEp()">＋ 話を追加</button>
  </fieldset>

  <fieldset>
    <legend>おまけ漫画・後付</legend>
    <div id="omakeList"></div>
    <button class="add" onclick="addOmake()">＋ おまけ漫画を追加</button>
    <div class="row" style="margin-top:8px">
      <label class="chk"><input type="checkbox" id="chara">キャラ紹介</label>
      <label class="chk"><input type="checkbox" id="atogaki">あとがき</label>
      <label class="chk"><input type="checkbox" id="yokoku">次巻予告</label>
      <label class="chk"><input type="checkbox" id="okuzuke" checked>奥付</label>
    </div>
    <div class="row">
      <label>空きページの表記</label>
      <select id="blankLabel">
        <option value="">（空欄）</option>
        <option value="予備">予備</option>
        <option value="カットページ">カットページ</option>
        <option value="広告">広告</option>
      </select>
    </div>
  </fieldset>

  <fieldset>
    <legend>表示・データ</legend>
    <div class="row">
      <label class="chk"><input type="checkbox" id="showSide" checked>ノンブル横に右／左を表示</label>
    </div>
    <div class="row">
      <button onclick="saveJSON()">設定を保存（JSON）</button>
      <button onclick="document.getElementById('loadFile').click()">読み込み</button>
      <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadJSON(this)">
    </div>
  </fieldset>

</div>

<!-- ================= 出力 ================= -->
<div id="out">
  <div id="booktitle"></div>
  <div id="bookmeta"></div>
  <div id="status"></div>
  <div id="advice"></div>
  <div id="strip"></div>
  <div id="striplegend"></div>
  <div id="epstarts"></div>
  <div id="tools">
    <button class="primary" onclick="copyFormatted()">書式付きコピー（色・罫線ごと）</button>
    <button onclick="downloadXLSX()">Excel（.xlsx）ダウンロード</button>
    <button onclick="copyTSV()">TSVコピー（値のみ）</button>
    <button onclick="downloadCSV()">CSVダウンロード</button>
    <button onclick="window.print()">印刷 / PDF</button>
  </div>
  <div id="toolhint">「書式付きコピー」→ Googleスプレッドシートで <b>Ctrl+V（⌘V）</b> すると色・罫線ごと貼り付きます。.xlsxはそのままExcelで開くか、スプレッドシートの「ファイル→インポート」でも取り込めます。</div>
  <div id="grid"></div>
</div>
</div>
<div id="toast"></div>

<script>
/* ============================================================
   台割ジェネレーター
   ============================================================ */
const $ = id => document.getElementById(id);

/* ---------- 配色（書式付きコピー／xlsxにもそのまま使う） ---------- */
const INK='#1c3557', LINE='#c9d4dc', BAND='#eef3f7';
const C = {
  cover:'#dfe6ec', toc:'#dfe6ec', kuchie:'#f3dfc3',
  cut:'#f5e6b8', logo:'#e0d6ee', omake:'#cfe8d5',
  blank:'#f0f0ee', okuzuke:'#c8d2dc'
};
const EPCOLORS=['#d9e7f5','#f0e2e0','#e2eede','#f2ead6','#e4e0ef','#dcebea'];

/* ---------- 動的リスト：収録話 ---------- */
let eps = [
  {name:'第1話', pages:24, cut:0, logo:0, renStart:1},
  {name:'第2話', pages:24, cut:1, logo:1, renStart:1},
];
let omakes = [];

function epRow(e,i){
  return `<div class="item">
    <div class="item-head">
      <span class="idx">${i+1}</span>
      <input type="text" value="${esc(e.name)}" onchange="eps[${i}].name=this.value;render()" style="flex:1">
      <button class="mini" onclick="moveEp(${i},-1)" title="上へ">↑</button>
      <button class="mini" onclick="moveEp(${i},1)" title="下へ">↓</button>
      <button class="mini" onclick="eps.splice(${i},1);render()" title="削除">×</button>
    </div>
    <div class="row">
      <label>本編</label><input type="number" min="1" value="${e.pages}" onchange="eps[${i}].pages=+this.value;render()"><span class="hint">P</span>
      <label>連載時 開始番号</label><input type="number" min="0" value="${e.renStart}" onchange="eps[${i}].renStart=+this.value;render()" style="width:50px">
    </div>
    <div class="row">
      <label>直前に → カット</label><input type="number" min="0" value="${e.cut}" onchange="eps[${i}].cut=+this.value;render()" style="width:45px"><span class="hint">P</span>
      <label>ロゴ</label><input type="number" min="0" value="${e.logo}" onchange="eps[${i}].logo=+this.value;render()" style="width:45px"><span class="hint">P</span>
    </div>
  </div>`;
}
function omakeRow(o,i){
  return `<div class="item">
    <div class="item-head">
      <span class="idx">${i+1}</span>
      <input type="text" value="${esc(o.name)}" onchange="omakes[${i}].name=this.value;render()" style="flex:1">
      <button class="mini" onclick="omakes.splice(${i},1);render()">×</button>
    </div>
    <div class="row"><label>ページ数</label><input type="number" min="1" value="${o.pages}" onchange="omakes[${i}].pages=+this.value;render()"><span class="hint">P（奥付の直前にまとめて配置）</span></div>
  </div>`;
}
function addEp(){
  const n = eps.length+1;
  eps.push({name:'第'+n+'話', pages:24, cut:1, logo:1, renStart:1});
  render();
}
function addOmake(){
  omakes.push({name:'おまけ漫画'+(omakes.length? '②③④⑤⑥⑦⑧⑨'[omakes.length-1]||'':'①'), pages:2});
  render();
}
function moveEp(i,d){
  const j=i+d; if(j<0||j>=eps.length)return;
  [eps[i],eps[j]]=[eps[j],eps[i]]; render();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

/* ---------- ページ列の構築 ---------- */
function buildPages(){
  const total = totalPages();
  const seq = []; // {label, ren, color, type}
  const push=(label,ren,color,type)=>seq.push({label,ren,color,type});

  // 前付
  for(let i=0;i<+$('kuchie').value;i++) push(i===0?'カラー口絵':'↓','', C.kuchie,'kuchie');
  if($('cover').checked) push('総扉','',C.cover,'cover');
  for(let i=0;i<+$('toc').value;i++) push(i===0?'目次':'↓','',C.toc,'toc');

  // 各話
  eps.forEach((e,ei)=>{
    for(let i=0;i<e.cut;i++)  push('カットページ','',C.cut,'cut');
    for(let i=0;i<e.logo;i++) push('ロゴページ','',C.logo,'logo');
    for(let i=0;i<e.pages;i++)
      push(i===0?e.name:'↓', e.renStart+i, EPCOLORS[ei%EPCOLORS.length],'ep');
  });

  // 後付（固定部）を先に数えて、空きページを本編と後付の間に挟む
  const back=[];
  omakes.forEach(o=>{ for(let i=0;i<o.pages;i++) back.push({label:i===0?o.name:'↓',ren:'',color:C.omake,type:'omake'}); });
  if($('chara').checked)  back.push({label:'キャラ紹介',ren:'',color:C.omake,type:'chara'});
  if($('atogaki').checked)back.push({label:'あとがき',ren:'',color:C.omake,type:'atogaki'});
  if($('yokoku').checked) back.push({label:'次巻予告',ren:'',color:C.omake,type:'yokoku'});
  if($('okuzuke').checked)back.push({label:'奥付',ren:'',color:C.okuzuke,type:'okuzuke'});

  const used = seq.length + back.length;
  const blank = total - used;
  const bl = $('blankLabel').value;
  for(let i=0;i<Math.max(0,blank);i++) push(bl && i===0? bl : (bl?'↓':''), '', C.blank,'blank');
  back.forEach(p=>seq.push(p));

  return {seq, total, used, blank};
}
function totalPages(){ return (+$('oris').value)*16 + (+$('adjust').value); }

/* ---------- 描画 ---------- */
function render(){
  $('epList').innerHTML   = eps.map(epRow).join('');
  $('omakeList').innerHTML= omakes.map(omakeRow).join('');

  const {seq,total,used,blank} = buildPages();
  $('totalDisp').textContent = total;
  $('totalCalc').textContent = `　（${$('oris').value}折 × 16P ${+$('adjust').value>=0?'＋':'−'}${Math.abs(+$('adjust').value)}P）`;

  const vol=$('vol').value, fmt=$('format').value, title=$('title').value||'（作品名未入力）';
  $('booktitle').textContent = `コミックス台割　「${title}」 ${vol}巻`;
  $('bookmeta').textContent  = `${fmt} / ${total}P / ${$('oris').value}折`;

  // ステータス
  let st=`<span class="badge">本編・付き物 合計 ${used}P</span>`;
  if(total%4!==0) st+=`<span class="badge warn">総ページが4の倍数ではありません</span>`;
  if(blank<0)      st+=`<span class="badge warn">${-blank}P 超過</span>`;
  else if(blank>0) st+=`<span class="badge">空き ${blank}P</span>`;
  else             st+=`<span class="badge good">過不足なし ✓</span>`;
  $('status').innerHTML=st;

  // 過不足アドバイス
  const adv=$('advice');
  if(blank<0){
    const over=-blank;
    const tips=[
      `折数を＋${Math.ceil(over/16)}（＋${Math.ceil(over/16)*16}P）にする`,
      `調整を＋${Math.ceil(over/4)*4}P にする`,
      `カット／ロゴを ${over}P 削る`
    ];
    adv.className=''; adv.textContent='⚠ 収まっていません → '+tips.join(' ／ ');
  }else if(blank>0){
    adv.className='ok';
    adv.textContent=`空き${blank}Pの充当案：おまけ漫画を追加 ／ カットページ追加 ／ キャラ紹介・次巻予告 ／ 調整で−${Math.floor(blank/4)*4}P`;
  }else{ adv.textContent=''; }

  // 束ストリップ（1折ごとに区切り）
  let strip='';
  for(let f=0; f*16<total; f++){
    let seg='';
    for(let p=f*16; p<Math.min((f+1)*16,total); p++){
      const pg=seq[p];
      seg+=`<div class="tick" style="background:${pg?pg.color:C.blank}" title="P.${p+1}　${pg?pg.label==='↓'?'（続き）':pg.label:''}"></div>`;
    }
    strip+=`<div class="fold-seg" title="${f+1}折">${seg}</div>`;
  }
  $('strip').innerHTML=strip;
  $('striplegend').innerHTML=
    `<span><i style="background:${C.cover}"></i>総扉・目次</span>
     <span><i style="background:${EPCOLORS[0]}"></i>本編（話ごとに色分け）</span>
     <span><i style="background:${C.cut}"></i>カット</span>
     <span><i style="background:${C.logo}"></i>ロゴ</span>
     <span><i style="background:${C.omake}"></i>おまけ・後付</span>
     <span><i style="background:${C.blank}"></i>空き</span>
     <span><i style="background:${C.okuzuke}"></i>奥付</span>`;

  // 各話開始ページの左右（右綴じ：奇数＝左ページ／偶数＝右ページ）
  let starts=[];
  seq.forEach((pg,i)=>{
    if(pg.type==='ep' && pg.label!=='↓'){
      const side=(i+1)%2===0?'右':'左';
      starts.push(`${esc(pg.label)}：<code>P.${i+1}</code>（${side==='左'?'<span class="L">左</span>':'右'}）`);
    }
  });
  $('epstarts').innerHTML= starts.length?
    '各話の開始ページ　'+starts.join('　｜　')+'<br><span class="hint">※右綴じは偶数ノンブル＝右ページ。扉を右起こしにしたい場合はカット数で調整してください。見開きは「偶数→奇数」の組です。</span>':'';

  // 台割テーブル（4折＝64Pずつのブロック）
  const showSide=$('showSide').checked;
  let grid='';
  const perBlock=64;
  for(let b=0;b*perBlock<total;b++){
    let rows='';
    for(let i=b*perBlock;i<Math.min((b+1)*perBlock,total);i++){
      const pg=seq[i]||{label:'',ren:'',color:C.blank};
      const foldStart = i%16===0;
      const fold = foldStart? Math.floor(i/16)+1 : '';
      const side=(i+1)%2===0?'右':'左';
      rows+=`<tr class="${foldStart?'fold-start':''}">
        <td class="ori">${fold}</td>
        <td class="num">${i+1}${showSide?`<span class="side">${side}</span>`:''}</td>
        <td class="content" style="background:${pg.color}" contenteditable="true" data-p="${i}">${esc(pg.label)}</td>
        <td class="ren">${pg.ren}</td></tr>`;
    }
    grid+=`<table><thead><tr><th>折</th><th>ページ</th><th>内容</th><th>連載時</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  $('grid').innerHTML=grid;
}

/* ---------- エクスポート共通 ---------- */
function collectRows(){
  // 画面上の contenteditable の内容をそのまま拾う（手修正を反映）
  const rows=[];
  document.querySelectorAll('#grid tbody tr').forEach(tr=>{
    const td=tr.children;
    rows.push({fold:td[0].textContent, page:td[1].textContent.replace(/右|左/g,''), content:td[2].textContent, ren:td[3].textContent});
  });
  return rows;
}
function makeTSV(rows){
  const total=rows.length, perBlock=64, blocks=Math.ceil(total/perBlock);
  const title=`コミックス台割\t\t\t${$('format').value}\t${total}P\t\t「${$('title').value}」 ${$('vol').value}巻`;
  let lines=[title,'', Array(blocks).fill('折\tページ\t内容\t連載時').join('\t')];
  for(let r=0;r<perBlock;r++){
    const cells=[];
    for(let b=0;b<blocks;b++){
      const row=rows[b*perBlock+r];
      cells.push(row? `${row.fold}\t${row.page}\t${row.content}\t${row.ren}` : '\t\t\t');
    }
    lines.push(cells.join('\t'));
  }
  return lines.join('\n');
}

/* ---------- 書式付きコピー（HTML形式でクリップボードへ） ---------- */
async function copyFormatted(){
  const rows=collectRows();
  const {seq}=buildPages();
  const total=rows.length, perBlock=64, blocks=Math.ceil(total/perBlock);
  const bd=`border:1px solid ${LINE};`;
  const td=(v,extra='')=>`<td style="${bd}${extra}">${esc(v)}</td>`;

  let html='<table style="border-collapse:collapse;font-size:10pt">';
  // タイトル行
  html+='<tr>'+td('コミックス台割','font-weight:bold;border:none;')+td('','border:none;')+td('','border:none;')
      +td($('format').value,'border:none;')+td(total+'P','border:none;')+td('','border:none;')
      +td(`「${$('title').value}」 ${$('vol').value}巻`,'font-weight:bold;border:none;')+'</tr>';
  html+='<tr></tr>';
  // ヘッダー行
  html+='<tr>';
  for(let b=0;b<blocks;b++)
    ['折','ページ','内容','連載時'].forEach(h=>{
      html+=`<td style="${bd}background:${INK};color:#ffffff;font-weight:bold;">${h}</td>`;
    });
  html+='</tr>';
  // データ行
  for(let r=0;r<perBlock;r++){
    html+='<tr>';
    for(let b=0;b<blocks;b++){
      const i=b*perBlock+r, row=rows[i];
      if(!row){ html+=td('','border:none;')+td('','border:none;')+td('','border:none;')+td('','border:none;'); continue; }
      const color=(seq[i]&&seq[i].color)||C.blank;
      const topline = i%16===0? `border-top:2px solid ${INK};`:'';
      html+=td(row.fold, `${topline}background:${BAND};font-weight:bold;text-align:right;`);
      html+=td(row.page, `${topline}text-align:right;`);
      html+=td(row.content, `${topline}background:${color};`);
      html+=td(row.ren, `${topline}text-align:right;`);
    }
    html+='</tr>';
  }
  html+='</table>';

  try{
    await navigator.clipboard.write([new ClipboardItem({
      'text/html': new Blob([html],{type:'text/html'}),
      'text/plain': new Blob([makeTSV(rows)],{type:'text/plain'})
    })]);
    toast('書式ごとコピーしました。スプレッドシートのA1セルを選んで Ctrl+V（⌘V）で貼り付けてください');
  }catch(e){
    // ClipboardItem非対応環境へのフォールバック
    await navigator.clipboard.writeText(makeTSV(rows));
    toast('この環境では書式付きコピーが使えないため、値のみコピーしました');
  }
}

/* ---------- Excel（.xlsx）出力：色・罫線付き ---------- */
async function downloadXLSX(){
  if(typeof ExcelJS==='undefined'){ toast('ExcelJSが読み込めていません（オフライン？）。TSV/CSVをご利用ください'); return; }
  const rows=collectRows();
  const {seq}=buildPages();
  const total=rows.length, perBlock=64, blocks=Math.ceil(total/perBlock);
  const argb=hex=>'FF'+hex.replace('#','').toUpperCase();
  const thin={style:'thin',color:{argb:argb(LINE)}};
  const thick={style:'medium',color:{argb:argb(INK)}};

  const wb=new ExcelJS.Workbook();
  const ws=wb.addWorksheet('台割');

  // タイトル行
  ws.getCell(1,1).value='コミックス台割';
  ws.getCell(1,4).value=$('format').value;
  ws.getCell(1,5).value=total+'P';
  ws.getCell(1,7).value=`「${$('title').value}」 ${$('vol').value}巻`;
  ws.getRow(1).font={bold:true};

  // ヘッダー & 列幅
  for(let b=0;b<blocks;b++){
    ['折','ページ','内容','連載時'].forEach((h,c)=>{
      const cell=ws.getCell(3,b*4+c+1);
      cell.value=h;
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:argb(INK)}};
      cell.font={color:{argb:'FFFFFFFF'},bold:true};
      cell.border={top:thin,bottom:thin,left:thin,right:thin};
    });
    ws.getColumn(b*4+1).width=5;
    ws.getColumn(b*4+2).width=7;
    ws.getColumn(b*4+3).width=16;
    ws.getColumn(b*4+4).width=7;
  }

  // データ
  rows.forEach((r,i)=>{
    const excelRow=4+(i%perBlock), colBase=Math.floor(i/perBlock)*4;
    const border={top:(i%16===0)?thick:thin,bottom:thin,left:thin,right:thin};
    const set=(c,v,fill,opts={})=>{
      const cell=ws.getCell(excelRow,colBase+c);
      cell.value=v;
      if(fill) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:argb(fill)}};
      cell.border=border;
      if(opts.bold) cell.font={bold:true};
      if(opts.right) cell.alignment={horizontal:'right'};
    };
    set(1, r.fold===''?null:+r.fold, BAND, {bold:true,right:true});
    set(2, +r.page, null, {right:true});
    set(3, r.content, (seq[i]&&seq[i].color)||C.blank);
    set(4, r.ren===''?null:+r.ren, null, {right:true});
  });

  const buf=await wb.xlsx.writeBuffer();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
  a.download=`台割_${$('title').value||'untitled'}_${$('vol').value}巻.xlsx`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Excelファイルを保存しました。スプレッドシートに取り込む場合は「ファイル→インポート」から');
}

/* ---------- TSV / CSV / JSON ---------- */
function copyTSV(){
  navigator.clipboard.writeText(makeTSV(collectRows()))
    .then(()=>toast('値のみコピーしました（書式は付きません）'));
}
function downloadCSV(){
  const rows=collectRows();
  let csv='\uFEFF折,ページ,内容,連載時,左右\n';
  rows.forEach((r,i)=>{ csv+=`${r.fold},${r.page},"${r.content.replace(/"/g,'""')}",${r.ren},${(i+1)%2===0?'右':'左'}\n`; });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`台割_${$('title').value||'untitled'}_${$('vol').value}巻.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('CSVを保存しました');
}
function saveJSON(){
  const state={title:$('title').value,vol:$('vol').value,format:$('format').value,
    oris:$('oris').value,adjust:$('adjust').value,kuchie:$('kuchie').value,
    cover:$('cover').checked,toc:$('toc').value,eps,omakes,
    chara:$('chara').checked,atogaki:$('atogaki').checked,yokoku:$('yokoku').checked,
    okuzuke:$('okuzuke').checked,blankLabel:$('blankLabel').value};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));
  a.download=`台割設定_${state.title||'untitled'}_${state.vol}巻.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('設定を保存しました');
}
function loadJSON(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const s=JSON.parse(r.result);
    $('title').value=s.title||''; $('vol').value=s.vol||1; $('format').value=s.format||'B6判';
    $('oris').value=s.oris||11; $('adjust').value=s.adjust||0; $('kuchie').value=s.kuchie||0;
    $('cover').checked=!!s.cover; $('toc').value=s.toc??1;
    eps=s.eps||[]; omakes=s.omakes||[];
    $('chara').checked=!!s.chara; $('atogaki').checked=!!s.atogaki; $('yokoku').checked=!!s.yokoku;
    $('okuzuke').checked=s.okuzuke!==false; $('blankLabel').value=s.blankLabel||'';
    render(); toast('設定を読み込みました');
  }catch(e){toast('読み込みに失敗しました：JSONの形式を確認してください')}};
  r.readAsText(f); input.value='';
}
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),3500);
}

/* ---------- バインド ---------- */
['title','vol','format','oris','adjust','kuchie','cover','toc','chara','atogaki','yokoku','okuzuke','blankLabel','showSide']
  .forEach(id=>$(id).addEventListener('input',render));

render();
